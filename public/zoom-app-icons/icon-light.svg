<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Light mode: dark icon on light background -->
  <rect width="512" height="512" rx="96" fill="#FFFFFF"/>

  <!-- Calendar body -->
  <rect x="112" y="136" width="288" height="248" rx="28" fill="#1E40AF"/>

  <!-- Calendar header bar -->
  <rect x="112" y="136" width="288" height="56" rx="28" fill="#1E3A8A"/>
  <rect x="112" y="172" width="288" height="20" fill="#1E3A8A"/>

  <!-- Binding rings -->
  <rect x="168" y="112" width="16" height="48" rx="6" fill="#0F172A"/>
  <rect x="328" y="112" width="16" height="48" rx="6" fill="#0F172A"/>

  <!-- Date dots (calendar grid) -->
  <circle cx="160" cy="232" r="10" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="208" cy="232" r="10" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="256" cy="232" r="10" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="304" cy="232" r="10" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="352" cy="232" r="10" fill="#FFFFFF" opacity="0.85"/>

  <circle cx="160" cy="280" r="10" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="208" cy="280" r="10" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="256" cy="280" r="10" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="304" cy="280" r="10" fill="#FFFFFF" opacity="0.85"/>

  <!-- Highlighted "today" -->
  <circle cx="208" cy="328" r="14" fill="#10B981"/>

  <!-- Chat bubble overlay (bottom right) -->
  <path d="M 296 296
           Q 296 280 312 280
           L 392 280
           Q 408 280 408 296
           L 408 360
           Q 408 376 392 376
           L 348 376
           L 328 396
           L 332 376
           L 312 376
           Q 296 376 296 360
           Z"
        fill="#10B981" stroke="#FFFFFF" stroke-width="6"/>

  <!-- Chat bubble dots -->
  <circle cx="328" cy="328" r="6" fill="#FFFFFF"/>
  <circle cx="352" cy="328" r="6" fill="#FFFFFF"/>
  <circle cx="376" cy="328" r="6" fill="#FFFFFF"/>
</svg>
